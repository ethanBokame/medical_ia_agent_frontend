<div class="flex mb-4 group" [class.justify-end]="isUser" [class.justify-start]="!isUser">
  <div class="relative max-w-[70%]">
    <!-- Message bubble -->
    <div class="rounded-2xl px-4 py-2 shadow-sm relative"
        [class.bg-[#E8513E]]="isUser"
        [class.bg-gray-100]="!isUser">
      <p class="text-sm pb-6" [class.text-white]="isUser" [class.text-gray-800]="!isUser">{{message}}</p>
      <span class="text-xs absolute bottom-2 left-4" [class.text-white/70]="isUser" [class.text-gray-500]="!isUser">{{formattedTime}}</span>
    </div>
    
    <!-- Actions buttons -->
    <div class="absolute bottom-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
      
      <!-- Copy button -->
      <button
        (click)="copyToClipboard()"
        class="p-1 rounded-lg transition-all hover:scale-110"
        [class.bg-white/20]="isUser"
        [class.hover:bg-white/30]="isUser"
        [class.bg-gray-200]="!isUser"
        [class.hover:bg-gray-300]="!isUser">
        
        <svg *ngIf="!isCopied" class="w-3 h-3" [class.text-white]="isUser" [class.text-gray-600]="!isUser" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
        </svg>
        
        <svg *ngIf="isCopied" class="w-3 h-3 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </button>

      <!-- Speak button (uniquement pour les messages de l'agent) -->
      <button
        *ngIf="!isUser"
        (click)="speakMessage()"
        class="p-1 rounded-lg transition-all hover:scale-110"
        [class.bg-gray-200]="!isUser"
        [class.hover:bg-gray-300]="!isUser">
        
        <svg *ngIf="!isSpeaking" class="w-3 h-3 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
        </svg>
        
        <svg *ngIf="isSpeaking" class="w-3 h-3 text-[#E8513E]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path>
        </svg>
      </button>
    </div>
  </div>
</div>
