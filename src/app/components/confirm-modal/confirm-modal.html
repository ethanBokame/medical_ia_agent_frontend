<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center">
  <!-- Overlay (fond sombre) -->
  <div class="fixed inset-0 bg-black/50 backdrop-blur-sm" (click)="onCancel()"></div>
  
  <!-- Modal -->
  <div class="relative bg-white rounded-2xl shadow-2xl max-w-md w-full mx-4 p-6 animate-slide-up">
    <!-- Icône d'avertissement -->
    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>
    
    <!-- Titre -->
    <h3 class="text-xl font-bold text-center mb-2">{{ title }}</h3>
    
    <!-- Message -->
    <p class="text-gray-600 text-center mb-6">{{ message }}</p>
    
    <!-- Boutons -->
    <div class="flex gap-3">
      <button (click)="onCancel()" 
              class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition">
        {{ cancelText }}
      </button>
      <button (click)="onConfirm()" 
              class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
        {{ confirmText }}
      </button>
    </div>
  </div>
</div>
