<div class="fixed top-0 right-0 z-40 p-4">
  <button 
    (click)="toggleDrawer()" 
    class="w-10 h-10 rounded-full bg-white shadow-lg hover:bg-gray-50 transition-all duration-300 flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-[#E8513E]">
    <div class="space-y-1.5">
      <span class="block w-5 h-0.5 bg-gray-600 transition-all duration-300" [class.rotate-45]="isDrawerOpen" [class.translate-y-2]="isDrawerOpen"></span>
      <span class="block w-5 h-0.5 bg-gray-600 transition-all duration-300" [class.opacity-0]="isDrawerOpen"></span>
      <span class="block w-5 h-0.5 bg-gray-600 transition-all duration-300" [class.-rotate-45]="isDrawerOpen" [class.-translate-y-2]="isDrawerOpen"></span>
    </div>
  </button>
</div>

<!-- Drawer (Menu latéral) -->
<div 
  *ngIf="isDrawerOpen"
  class="fixed inset-0 z-50 transition-all duration-300">
  
  <!-- Overlay transparent (fermeture au clic) -->
  <div 
    class="absolute inset-0 bg-transparent"
    (click)="closeDrawer()">
  </div>
  
  <!-- Drawer content -->
  <div 
    #drawer
    class="absolute top-0 right-0 h-full w-80 bg-white shadow-2xl transition-transform duration-300 transform"
    [class.translate-x-0]="isDrawerOpen"
    [class.translate-x-full]="!isDrawerOpen">
    
    <!-- Header du drawer -->
    <div class="p-6 border-b border-gray-200">
      <div class="flex justify-between items-center">
        <h2 class="text-xl font-semibold text-gray-800">Menu</h2>
        <button 
          (click)="closeDrawer()"
          class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center transition-colors">
          ✕
        </button>
      </div>
    </div>
    
    <!-- Navigation Links -->
    <nav class="p-4">
      <div class="space-y-2">
        <!-- Accueil (toujours accessible) -->
        <button 
          (click)="navigateTo('/')"
          class="w-full text-left px-4 py-3 rounded-lg hover:bg-gray-50 transition-all duration-200 flex items-center space-x-3 group">
          <svg class="w-5 h-5 text-gray-500 group-hover:text-[#E8513E] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
          </svg>
          <span class="text-gray-700 group-hover:text-[#E8513E] transition-colors font-medium">Accueil</span>
        </button>
        
        <!-- Agent (protégé - redirige vers login si non connecté) -->
        <button 
          (click)="navigateTo('/agent')"
          class="w-full text-left px-4 py-3 rounded-lg hover:bg-gray-50 transition-all duration-200 flex items-center space-x-3 group">
          <svg class="w-5 h-5 text-gray-500 group-hover:text-[#E8513E] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
          </svg>
          <span class="text-gray-700 group-hover:text-[#E8513E] transition-colors font-medium">J.A.R.V.I.S</span>
        </button>
        
        <!-- Login / Dashboard / Logout (conditionnel) -->
        <div *ngIf="!isLoggedIn()">
          <!-- Login (visible uniquement si non connecté) -->
          <button 
            (click)="navigateTo('/login')"
            class="w-full text-left px-4 py-3 rounded-lg hover:bg-gray-50 transition-all duration-200 flex items-center space-x-3 group">
            <svg class="w-5 h-5 text-gray-500 group-hover:text-[#E8513E] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
            </svg>
            <span class="text-gray-700 group-hover:text-[#E8513E] transition-colors font-medium">Connexion</span>
          </button>
        </div>
        
        <div *ngIf="isLoggedIn()">
          <!-- Dashboard (visible uniquement si connecté) -->
          <button 
            (click)="navigateTo('/dashboard')"
            class="w-full text-left px-4 py-3 rounded-lg hover:bg-gray-50 transition-all duration-200 flex items-center space-x-3 group">
            <svg class="w-5 h-5 text-gray-500 group-hover:text-[#E8513E] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
            </svg>
            <span class="text-gray-700 group-hover:text-[#E8513E] transition-colors font-medium">Dashboard</span>
          </button>
          
          <!-- Déconnexion -->
          <button 
            (click)="logout()"
            class="w-full text-left px-4 py-3 rounded-lg hover:bg-gray-50 transition-all duration-200 flex items-center space-x-3 group">
            <svg class="w-5 h-5 text-gray-500 group-hover:text-[#E8513E] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            <span class="text-gray-700 group-hover:text-[#E8513E] transition-colors font-medium">Déconnexion</span>
          </button>
        </div>
      </div>
    </nav>
    
    <!-- Footer du drawer (optionnel) -->
    <div class="absolute bottom-0 left-0 right-0 p-6 border-t border-gray-200">
      <div class="text-xs text-gray-400 text-center">
        © 2026 - J.A.R.V.I.S
      </div>
    </div>
  </div>
</div>
