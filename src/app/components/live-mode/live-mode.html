`
    <div class="fixed inset-0 flex items-center justify-center">
      <button
        (click)="close.emit()"
        class="absolute top-4 right-4 text-white text-2xl hover:text-[#E8513E] transition-colors z-20">
        ✕
      </button>
      
      <div class="text-center">
        <div #cubeContainer class="cube-container">
          <div class="cube" [class.speaking]="isSpeaking">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="face right"></div>
            <div class="face left"></div>
            <div class="face top"></div>
            <div class="face bottom"></div>
          </div>
        </div>
        
        <p class="text-white mt-8 text-lg">
          {{ isSpeaking ? '🎤 Vous parlez...' : '🔴 Live Mode - Cliquez sur Audio pour parler' }}
        </p>
      </div>
    </div>
